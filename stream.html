<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Stream</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: #1e1b4b;
      color: #ffffff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    /* Card - no blur, solid background */
    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 30px;
      margin-bottom: 20px;
    }
    
    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .stat-box {
      text-align: center;
      padding: 20px;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
    }
    
    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #10b981;
    }
    
    .status-badge.complete {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
      color: #a78bfa;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Progress bar */
    .progress-container {
      margin: 25px 0;
    }
    
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #a78bfa);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    
    .btn {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    /* Table */
    .table-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
    }
    
    .table-header {
      padding: 25px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .table-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .table-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .table-wrapper {
      max-height: 500px;
      overflow-y: auto;
    }
    
    .table-wrapper::-webkit-scrollbar {
      width: 8px;
    }
    
    .table-wrapper::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .table-wrapper::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    thead {
      position: sticky;
      top: 0;
      background: #1e1b4b;
      z-index: 10;
    }
    
    th {
      text-align: left;
      padding: 16px 30px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    td {
      padding: 16px 30px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    tbody tr {
      transition: background 0.2s;
    }
    
    tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .new-row {
      animation: slideIn 0.4s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        background: rgba(139, 92, 246, 0.2);
      }
      to {
        opacity: 1;
        background: transparent;
      }
    }
    
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Live Data Stream</div>
      <div class="subtitle">Real-time data monitoring</div>
    </div>

    <div class="card">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Status</div>
          <div id="statusBadge" class="status-badge">
            <span class="status-dot"></span>
            <span id="statusText">Connecting</span>
          </div>
        </div>
        
        <div class="stat-box">
          <div class="stat-label">Records</div>
          <div class="stat-value" id="count">0</div>
        </div>
        
        <div class="stat-box">
          <div class="stat-label">Speed</div>
          <div class="stat-value"><span id="speed">0</span><span style="font-size: 16px; opacity: 0.6;">/s</span></div>
        </div>
      </div>
      
      <div class="progress-container">
        <div class="progress-info">
          <span>Progress</span>
          <span id="progressText">0 / 10,000</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      
      <div class="controls">
        <button class="btn" id="pauseBtn" disabled>⏸ Pause</button>
        <button class="btn" id="clearBtn">Clear Table</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Recent Data</div>
        <div class="table-subtitle" id="tableInfo">Waiting for stream...</div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>PK</th>
              <th>SK</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Date of Birth</th>
              <th>Zipcode</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-state">
              <td colspan="6">
                <div class="empty-icon">⟳</div>
                <div>Waiting for data...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const tableBody = $('#tableBody');
    const statusBadge = $('#statusBadge');
    const statusText = $('#statusText');
    const countEl = $('#count');
    const speedEl = $('#speed');
    const progressFill = $('#progressFill');
    const progressText = $('#progressText');
    const tableInfo = $('#tableInfo');
    const pauseBtn = $('#pauseBtn');
    const clearBtn = $('#clearBtn');
    
    let count = 0;
    let isPaused = false;
    let startTime = Date.now();
    let evtSource;

    // Speed calculation
    setInterval(() => {
      if (count > 0 && !isPaused) {
        const elapsed = (Date.now() - startTime) / 1000;
        const speed = Math.round(count / elapsed);
        speedEl.text(speed);
      }
    }, 1000);

    // Update progress
    function updateProgress() {
      const progress = Math.min((count / 1000) * 100, 100);
      progressFill.css('width', progress + '%');
      progressText.text(`${count.toLocaleString()} / 1,000`);
      countEl.text(count.toLocaleString());
    }

    // Clear table
    clearBtn.on('click', () => {
      tableBody.empty();
      tableBody.append(`
        <tr class="empty-state">
          <td colspan="6">
            <div class="empty-icon">✓</div>
            <div>Table cleared</div>
          </td>
        </tr>
      `);
    });

    // Pause button
    pauseBtn.on('click', () => {
      isPaused = !isPaused;
      pauseBtn.text(isPaused ? '▶ Resume' : '⏸ Pause');
    });

    function startStream() {
      evtSource = new EventSource('/stream');

      evtSource.onopen = () => {
        statusBadge.removeClass('complete');
        statusText.text('Streaming');
        pauseBtn.prop('disabled', false);
        tableInfo.text('Receiving data...');
      };

      evtSource.onmessage = (event) => {
        if (isPaused) return;

        const row = JSON.parse(event.data);
        count++;

        updateProgress();
        tableInfo.text(`Last 50 of ${count.toLocaleString()} records`);

        // Remove empty state
        $('.empty-state').remove();

        const tr = $('<tr class="new-row"></tr>').html(`
          <td>${row.pk}</td>
          <td>${row.sk}</td>
          <td>${row.fname}</td>
          <td>${row.lname}</td>
          <td>${row.dob}</td>
          <td>${row.zipcode}</td>
        `);
        
        tableBody.append(tr);

        // Keep last 50 rows
        while (tableBody.children().length > 50) {
          tableBody.children().first().remove();
        }

        if (row.last_row) {
          statusBadge.addClass('complete');
          statusText.text('Complete');
          pauseBtn.prop('disabled', true);
          tableInfo.text(`Complete - ${count.toLocaleString()} total records`);
          evtSource.close();
        }
      };

      evtSource.onerror = (err) => {
        statusBadge.addClass('complete');
        statusText.text('Ended');
        pauseBtn.prop('disabled', true);
        tableInfo.text(`Ended - ${count.toLocaleString()} records`);
        console.error('SSE error:', err);
        evtSource.close();
      };
    }

    // Start on load
    $(document).ready(() => {
      startStream();
    });
  </script>
</body>
</html>
